# Application name and port
spring.application.name=registration-service
server.port=8000

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.config.import=configserver:http://localhost:7000/

# H2 Database configuration
spring.datasource.url=jdbc:h2:file:D:/banking-project/data/demo-db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console (handy for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

error.name.size.message=Name should be between 3 and 100 characters
error.name.regexp.message=Name should contain only capital and small letters and space
error.mobile.regexp.message=Mobile should contain 10 digits only
error.email.size.message=Email should be between 10 and 100 characters
error.email.email.message=Given email is not a valid email address
error.address.size.message=Address should be between 10 and 255 characters
error.password.size.message=Password should be between 8 and 16 characters
error.password.regexp.message=Password is alphanumeric. It can only contain special characters !@#$
