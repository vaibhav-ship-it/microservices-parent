spring.application.name=transfer-service

server.port=8002

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
spring.config.import=configserver:http://localhost:7000/

# H2 Database configuration
spring.datasource.url=jdbc:h2:file:D:/banking-project/data/demo-db;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console (handy for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
